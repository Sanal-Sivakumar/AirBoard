name: clipboard
description: A cross-platform clipboard synchronization application prototype.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  uuid: ^4.0.0
  rxdart: ^0.27.7
  flutter_secure_storage: ^9.0.0
  freezed_annotation: ^2.4.4
  rust_lib_clipboard:
    path: rust_builder


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  freezed: ^2.4.0
  build_runner: ^2.4.8
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png


